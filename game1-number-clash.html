<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>King Kong vs. Godzilla — Number Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frijole&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:   #FFD700;
      --kong:   #FFDD44;
      --godzilla: #66FF99;
      --dark:   #0d0d1e;
      --card-w: clamp(140px, 18vw, 210px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Frijole', 'Nunito', 'Comic Sans MS', 'Chalkboard SE', cursive;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===================== SCREENS ===================== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .screen[hidden] { display: none; }

    /* ===================== START SCREEN ===================== */
    #start-screen {
      background: radial-gradient(ellipse at 50% 30%, #1c1c44 0%, #0a0a18 100%);
      gap: 18px;
    }

    .title-wrap {
      text-align: center;
      line-height: 1.05;
      text-shadow: 0 4px 16px rgba(0,0,0,0.8);
    }
    .title-kong     { font-size: clamp(26px, 5.5vw, 60px); font-weight: 900; color: var(--kong); }
    .title-vs       { font-size: clamp(16px, 3vw, 36px);   font-weight: 900; color: #FF6633; }
    .title-godzilla { font-size: clamp(26px, 5.5vw, 60px); font-weight: 900; color: var(--godzilla); }
    .title-sub      { font-size: clamp(14px, 2.2vw, 24px); color: #AACEFF; margin-top: 4px; }

    .preview-row {
      display: flex;
      gap: clamp(24px, 5vw, 80px);
      align-items: flex-end;
    }
    .preview-row img {
      height: clamp(100px, 17vh, 180px);
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.7));
    }
    .preview-row img:last-child { transform: scaleX(-1); }

    .arena-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .arena-label { font-size: clamp(13px, 1.8vw, 20px); color: #AACEFF; font-weight: 700; }
    .arena-row   { display: flex; gap: clamp(16px, 3.5vw, 48px); }

    .arena-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
    .arena-circle {
      width:  clamp(72px, 12vw, 110px);
      height: clamp(72px, 12vw, 110px);
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 3px solid rgba(255,255,255,0.18);
      transition: all 0.18s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .arena-btn.active .arena-circle {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255,215,0,0.5), 0 4px 16px rgba(0,0,0,0.5);
      transform: scale(1.1);
    }
    .arena-name {
      font-size: clamp(11px, 1.5vw, 16px);
      color: #AACEFF;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .arena-btn.active .arena-name { color: var(--gold); }

    .play-btn {
      padding: clamp(12px, 1.8vw, 18px) clamp(36px, 6vw, 64px);
      font-size: clamp(18px, 2.8vw, 30px);
      font-family: inherit;
      font-weight: 900;
      background: linear-gradient(135deg, #FF7700, #FF3300);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,60,0,0.55);
      transition: all 0.18s;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .play-btn:hover  { transform: scale(1.06) translateY(-3px); box-shadow: 0 10px 32px rgba(255,60,0,0.65); }
    .play-btn:active { transform: scale(0.97); }

    /* ===================== GAME SCREEN ===================== */
    #game-screen { flex-direction: column; }

    #arena-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      background-image: url('assets/bg-city-arena.png');
      transition: background-image 0.6s;
    }
    #arena-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
    }

    /* HUD */
    #hud {
      position: relative; z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(8px,1.2vh,14px) clamp(12px,2vw,24px);
      background: rgba(0,0,6,0.82);
      backdrop-filter: blur(6px);
      gap: 8px;
    }
    .hud-left, .hud-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .hud-right { justify-content: flex-end; }

    .round-label {
      font-size: clamp(13px, 2vw, 22px);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    /* Round pips */
    .pips {
      display: flex;
      gap: clamp(4px, 0.8vw, 10px);
      align-items: center;
    }
    .pip {
      width:  clamp(10px, 1.5vw, 18px);
      height: clamp(10px, 1.5vw, 18px);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      transition: all 0.3s;
    }
    .pip.first-try   { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px rgba(255,215,0,0.5); }
    .pip.with-hint   { background: #aaa;        border-color: #ccc; }

    .help-btn {
      width:  clamp(38px, 5vw, 52px);
      height: clamp(38px, 5vw, 52px);
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      border: 2px solid rgba(255,255,255,0.35);
      color: #fff;
      font-size: clamp(18px, 2.5vw, 26px);
      font-weight: 900;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      flex-shrink: 0;
    }
    .help-btn:hover  { background: rgba(255,255,255,0.28); transform: scale(1.1); }
    .help-btn:active { transform: scale(0.95); }

    /* Arena */
    #arena {
      position: relative; z-index: 5;
      flex: 1;
      width: 100%;
      display: flex;
      align-items: stretch;
    }

    .fighter-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 clamp(10px, 2vw, 32px) clamp(10px, 2vh, 24px);
      gap: clamp(6px, 1.2vh, 14px);
    }

    .monster-wrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .monster-img {
      height: clamp(140px, 27vh, 300px);
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.65));
      transition: filter 0.25s;
      pointer-events: none;
    }
    /* Godzilla faces left toward Kong */
    #godzilla-zone .monster-img { transform: scaleX(-1); }

    .fighter-name {
      font-size: clamp(13px, 1.8vw, 22px);
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    #kong-name     { color: var(--kong); }
    #godzilla-name { color: var(--godzilla); }

    .win-dots {
      display: flex;
      gap: clamp(4px, 0.7vw, 8px);
    }
    .win-dot {
      width:  clamp(10px, 1.6vw, 18px);
      height: clamp(10px, 1.6vw, 18px);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    #kong-wins     .win-dot.won { background: var(--kong);     border-color: var(--kong);     box-shadow: 0 0 8px rgba(255,215,0,0.6); }
    #godzilla-wins .win-dot.won { background: var(--godzilla); border-color: var(--godzilla); box-shadow: 0 0 8px rgba(68,221,136,0.6); }

    /* Number cards */
    .number-card {
      width: var(--card-w);
      min-height: var(--card-w);
      background: rgba(255,255,255,0.95);
      border-radius: clamp(14px, 2vw, 22px);
      border: 4px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.14s, box-shadow 0.14s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      padding: clamp(8px, 1.2vw, 16px);
      gap: clamp(4px, 0.8vh, 10px);
      flex-shrink: 0;
    }
    .number-card:hover  { transform: translateY(-5px) scale(1.05); box-shadow: 0 14px 40px rgba(0,0,0,0.65); }
    .number-card:active { transform: scale(0.97); }
    .number-card.disabled { pointer-events: none; }

    #kong-card     { border-color: #FFD740; }
    #godzilla-card { border-color: #44DD88; }

    .card-num {
      font-size: clamp(40px, 8vw, 88px);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 700;
      line-height: 1;
      color: #1a1a2e;
    }

    /* Dot array */
    .dot-array {
      display: flex;
      flex-direction: column;
      gap: clamp(2px, 0.4vw, 4px);
      align-items: center;
    }
    .dot-row { display: flex; gap: clamp(2px, 0.4vw, 4px); }
    .dot {
      width:  clamp(7px, 1.1vw, 13px);
      height: clamp(7px, 1.1vw, 13px);
      border-radius: 50%;
      background: #3366CC;
    }
    .dot.ten-dot { background: #CC3300; }
    .dot.spacer  { background: transparent; }

    .ten-label {
      font-size: clamp(8px, 1vw, 11px);
      font-weight: 700;
      color: #CC3300;
      text-align: center;
      line-height: 1;
    }
    .ones-label {
      font-size: clamp(8px, 1vw, 11px);
      font-weight: 700;
      color: #3366CC;
      text-align: center;
      line-height: 1;
      margin-top: 2px;
    }

    /* Center VS strip */
    #center-strip {
      width: clamp(90px, 14vw, 160px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.5vh, 20px);
    }
    #man-img, #cobra-man-img {
      height: clamp(90px, 15vh, 180px);
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
      transition: opacity 0.15s;
    }
    .vs-text {
      font-size: clamp(22px, 4vw, 48px);
      font-weight: 900;
      color: #FF6633;
      text-shadow: 0 3px 10px rgba(0,0,0,0.7);
      white-space: nowrap;
    }

    /* Instruction / hint bar */
    #hint-bar {
      position: absolute;
      bottom: clamp(10px, 2vh, 22px);
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,16,0.88);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: clamp(8px,1.2vh,14px) clamp(16px,2.5vw,28px);
      color: #fff;
      font-size: clamp(13px, 1.9vw, 22px);
      font-weight: 700;
      text-align: center;
      max-width: 82%;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #hint-bar.hidden { opacity: 0; }

    /* ===================== ANIMATIONS ===================== */
    @keyframes cardReveal {
      0%   { transform: rotateY(90deg) scale(0.7); opacity: 0; }
      100% { transform: rotateY(0deg)  scale(1);   opacity: 1; }
    }
    .card-reveal { animation: cardReveal 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-12px); }
      35%      { transform: translateX(12px); }
      55%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
    .shake { animation: shake 0.46s ease-in-out; }

    @keyframes wrongFlash {
      0%,100% { background: rgba(255,255,255,0.95); box-shadow: 0 8px 32px rgba(0,0,0,0.55); }
      50%      { background: #FFE0E0; box-shadow: 0 0 28px rgba(255,50,50,0.6); }
    }
    .wrong-flash { animation: wrongFlash 0.45s ease-in-out; }

    @keyframes winGlow {
      0%,100% { box-shadow: 0 8px 32px rgba(0,0,0,0.55); }
      40%      { box-shadow: 0 0 40px rgba(255,215,0,0.9), 0 8px 32px rgba(0,0,0,0.55); }
    }
    .win-glow { animation: winGlow 0.55s ease-in-out 2; }

    @keyframes monsterBounce {
      0%   { transform: translateY(0); }
      28%  { transform: translateY(-28px); }
      55%  { transform: translateY(-14px); }
      75%  { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }
    @keyframes monsterBounceMirror {
      0%   { transform: scaleX(-1) translateY(0); }
      28%  { transform: scaleX(-1) translateY(-28px); }
      55%  { transform: scaleX(-1) translateY(-14px); }
      75%  { transform: scaleX(-1) translateY(-20px); }
      100% { transform: scaleX(-1) translateY(0); }
    }
    .monster-bounce        { animation: monsterBounce       0.65s ease-out; }
    .monster-bounce-mirror { animation: monsterBounceMirror 0.65s ease-out; }

    @keyframes greenFlash {
      0%,100% { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.65)); }
      40%      { filter: drop-shadow(0 0 28px rgba(80,255,130,0.9)) drop-shadow(0 8px 24px rgba(0,0,0,0.65)); }
    }
    .green-flash { animation: greenFlash 0.6s ease-in-out 2; }

    @keyframes greenFlashMirror {
      0%,100% { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.65)); transform: scaleX(-1); }
      40%      { filter: drop-shadow(0 0 28px rgba(80,255,130,0.9)) drop-shadow(0 8px 24px rgba(0,0,0,0.65)); transform: scaleX(-1); }
    }
    .green-flash-mirror { animation: greenFlashMirror 0.6s ease-in-out 2; }

    /* ===================== RESULT SCREEN ===================== */
    #result-screen {
      background: rgba(0,0,0,0.9);
    }
    .result-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px,2vh,22px);
      max-width: 600px;
      padding: clamp(20px,3vw,40px);
    }
    .result-title {
      font-size: clamp(26px, 5vw, 58px);
      font-weight: 900;
      text-align: center;
      color: var(--gold);
      text-shadow: 0 4px 14px rgba(0,0,0,0.7);
    }
    .result-monster {
      height: clamp(120px, 22vh, 220px);
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
    }
    .result-msg {
      font-size: clamp(15px, 2.2vw, 25px);
      color: #CCE0FF;
      text-align: center;
      line-height: 1.4;
    }
    .result-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: clamp(10px,1.5vw,16px) clamp(24px,4vw,48px);
      font-size: clamp(15px, 2vw, 22px);
      font-family: inherit;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn:hover  { transform: scale(1.06) translateY(-2px); }
    .btn:active { transform: scale(0.97); }
    .btn-primary   { background: linear-gradient(135deg, #FF7700, #FF3300); color: #fff; box-shadow: 0 6px 20px rgba(255,60,0,0.45); }
    .btn-secondary { background: rgba(255,255,255,0.13); color: #fff; border: 2px solid rgba(255,255,255,0.3); }

    /* ===================== CONFETTI ===================== */
    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 20;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* VS → comparison flash */
    .vs-text.compare { font-size: clamp(16px, 2.8vw, 34px); color: var(--gold); transition: color 0.2s; }

    /* ===================== COBRA BONUS SCREEN ===================== */
    #cobra-screen { flex-direction: column; background: #0d0005; }

    #cobra-arena-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #1a0005;
    }
    #cobra-arena-overlay {
      position: absolute; inset: 0;
      background: rgba(30,0,0,0.68);
    }

    #cobra-hud {
      position: relative; z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(8px,1.2vh,14px) clamp(12px,2vw,24px);
      background: rgba(0,0,6,0.85);
      backdrop-filter: blur(6px);
      flex-shrink: 0;
    }
    .cobra-badge {
      background: linear-gradient(135deg, #AA0000, #FF6600);
      color: #fff;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: clamp(11px, 1.5vw, 17px);
      font-weight: 900;
      animation: cobraPulse 0.75s ease-in-out infinite alternate;
      white-space: nowrap;
    }
    @keyframes cobraPulse {
      from { transform: scale(1);    box-shadow: none; }
      to   { transform: scale(1.07); box-shadow: 0 0 14px rgba(255,100,0,0.6); }
    }
    .cobra-score-box {
      display: flex;
      align-items: center;
      gap: clamp(6px, 1.2vw, 16px);
      font-size: clamp(22px, 3.8vw, 44px);
      font-weight: 900;
    }
    .cobra-score-sep { color: rgba(255,255,255,0.35); }
    .cobra-score-enemy { color: #FF6600; }
    .cobra-round-label {
      font-size: clamp(13px, 2vw, 22px);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    #cobra-arena {
      position: relative; z-index: 5;
      flex: 1;
      width: 100%;
      display: flex;
      align-items: stretch;
    }
    #cobra-center-strip {
      width: clamp(90px, 14vw, 160px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cobra-name { color: #FF6600; }
    #cobra-fighter-zone .monster-img { transform: scaleX(-1); }
    #cobra-card { border-color: #FF6600; }
    #cobra-enemy-wins .win-dot.won {
      background: #FF6600;
      border-color: #FF6600;
      box-shadow: 0 0 8px rgba(255,100,0,0.6);
    }

    #cobra-hint-bar {
      position: absolute;
      bottom: clamp(10px, 2vh, 22px);
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,16,0.88);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: clamp(8px,1.2vh,14px) clamp(16px,2.5vw,28px);
      color: #fff;
      font-size: clamp(13px, 1.9vw, 22px);
      font-weight: 700;
      text-align: center;
      max-width: 82%;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #cobra-hint-bar.hidden { opacity: 0; }

    @keyframes cobraFlash {
      0%,100% { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.65)); transform: scaleX(-1); }
      40%      { filter: drop-shadow(0 0 28px rgba(255,80,0,0.95)) drop-shadow(0 8px 24px rgba(0,0,0,0.65)); transform: scaleX(-1); }
    }
    .cobra-flash { animation: cobraFlash 0.6s ease-in-out 2; }

    .cobra-outcome {
      border: 2px solid #FF6600;
      color: #fff;
      padding: 8px 22px;
      border-radius: 12px;
      font-weight: 900;
      font-size: clamp(13px, 1.8vw, 20px);
      text-align: center;
    }
    .cobra-outcome.hero-won  { background: linear-gradient(135deg, #0a2a00, #153300); border-color: #44FF88; }
    .cobra-outcome.cobra-won { background: linear-gradient(135deg, #2a0000, #330000); border-color: #FF6600; }

    /* ===================== COBRA CUTSCENE ===================== */
    #cobra-cutscene {
      background: radial-gradient(ellipse at 50% 80%, #2a0000 0%, #0a0000 60%, #000 100%);
      flex-direction: column;
      justify-content: flex-end;
      gap: 0;
      cursor: pointer;
    }

    #cutscene-cobra-wrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
      width: 100%;
    }

    #cutscene-cobra-img {
      height: clamp(220px, 48vh, 480px);
      filter: drop-shadow(0 0 40px rgba(255,60,0,0.7)) drop-shadow(0 12px 30px rgba(0,0,0,0.9));
      transform: translateY(60px) scale(0.85);
      opacity: 0;
      transition: transform 0.9s cubic-bezier(0.22,1,0.36,1), opacity 0.7s ease;
      pointer-events: none;
    }
    #cutscene-cobra-img.risen {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    /* Red crack flash */
    #cutscene-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 100%, rgba(255,30,0,0.55) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    #cutscene-flash.flashing { opacity: 1; }

    /* Dialogue box */
    #cutscene-dialogue {
      width: 100%;
      background: linear-gradient(0deg, rgba(0,0,0,0.96) 0%, rgba(10,0,0,0.88) 100%);
      border-top: 2px solid rgba(255,60,0,0.5);
      padding: clamp(16px,2.5vh,28px) clamp(20px,4vw,48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px,1.2vh,14px);
      position: relative;
      flex-shrink: 0;
    }

    #cutscene-speaker {
      font-size: clamp(12px, 1.6vw, 18px);
      color: #FF6600;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #cutscene-speaker.visible { opacity: 1; }

    #cutscene-text {
      font-size: clamp(15px, 2.2vw, 26px);
      color: #fff;
      font-weight: 700;
      line-height: 1.35;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      text-align: center;
    }

    #cutscene-tap {
      font-size: clamp(11px, 1.4vw, 16px);
      color: rgba(255,150,80,0.7);
      font-weight: 700;
      letter-spacing: 1px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.5s;
      animation: tapBlink 1.1s ease-in-out infinite alternate;
    }
    #cutscene-tap.visible { opacity: 1; }
    @keyframes tapBlink {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }

    /* Screen-edge red vignette pulse on cobra rise */
    @keyframes vignetteIn {
      0%   { box-shadow: inset 0 0 0px rgba(200,0,0,0); }
      50%  { box-shadow: inset 0 0 120px rgba(200,0,0,0.55); }
      100% { box-shadow: inset 0 0 80px rgba(180,0,0,0.35); }
    }
    #cobra-cutscene.vignette { animation: vignetteIn 1.2s ease forwards; }
  </style>
</head>
<body>

<!-- ==================== START SCREEN ==================== -->
<div id="start-screen" class="screen">
  <div class="title-wrap">
    <div class="title-kong">KING KONG</div>
    <div class="title-vs">VS.</div>
    <div class="title-godzilla">GODZILLA</div>
    <div class="title-sub">Number Clash</div>
  </div>

  <div class="preview-row">
    <img src="assets/king-kong-idle.png" alt="King Kong">
    <img src="assets/godzilla-idle.png" alt="Godzilla">
  </div>

  <div class="arena-section">
    <div class="arena-label">Choose Your Arena</div>
    <div class="arena-row">
      <div class="arena-btn active" data-arena="city" onclick="selectArena('city')">
        <div class="arena-circle" style="background-image:url('assets/bg-city-arena.png')"></div>
        <div class="arena-name">CITY</div>
      </div>
      <div class="arena-btn" data-arena="ocean" onclick="selectArena('ocean')">
        <div class="arena-circle" style="background-image:url('assets/bg-ocean-arena.png')"></div>
        <div class="arena-name">OCEAN</div>
      </div>
      <div class="arena-btn" data-arena="jungle" onclick="selectArena('jungle')">
        <div class="arena-circle" style="background-image:url('assets/bg-jungle-arena.png')"></div>
        <div class="arena-name">JUNGLE</div>
      </div>
    </div>
  </div>

  <button class="play-btn" onclick="startBattle()">BATTLE!</button>
</div>

<!-- ==================== GAME SCREEN ==================== -->
<div id="game-screen" class="screen" hidden>
  <div id="arena-bg"></div>
  <div id="arena-overlay"></div>

  <div id="hud">
    <div class="hud-left">
      <span class="round-label">Round <span id="round-num">1</span> / 5</span>
    </div>
    <div class="pips" id="pips"></div>
    <div class="hud-right">
      <button class="help-btn" onclick="onHelpBtn()">?</button>
    </div>
  </div>

  <div id="arena">
    <!-- KONG -->
    <div class="fighter-zone" id="kong-zone">
      <div class="monster-wrap">
        <img src="assets/king-kong-idle.png" id="kong-img" class="monster-img" alt="King Kong">
      </div>
      <div class="fighter-name" id="kong-name">KING KONG</div>
      <div class="win-dots" id="kong-wins"></div>
      <div class="number-card" id="kong-card" onclick="onCardClick('kong')">
        <div class="card-num" id="kong-num">7</div>
        <div class="dot-array" id="kong-dots"></div>
      </div>
    </div>

    <!-- CENTER -->
    <div id="center-strip">
      <img src="assets/man-idle.png" id="man-img" alt="Referee">
      <div class="vs-text">VS</div>
    </div>

    <!-- GODZILLA -->
    <div class="fighter-zone" id="godzilla-zone">
      <div class="monster-wrap">
        <img src="assets/godzilla-idle.png" id="godzilla-img" class="monster-img" alt="Godzilla">
      </div>
      <div class="fighter-name" id="godzilla-name">GODZILLA</div>
      <div class="win-dots" id="godzilla-wins"></div>
      <div class="number-card" id="godzilla-card" onclick="onCardClick('godzilla')">
        <div class="card-num" id="godzilla-num">12</div>
        <div class="dot-array" id="godzilla-dots"></div>
      </div>
    </div>
  </div>

  <div id="hint-bar" class="hidden">Tap the BIGGER number!</div>
</div>

<!-- ==================== COBRA CUTSCENE ==================== -->
<div id="cobra-cutscene" class="screen" hidden onclick="cutsceneAdvance()">
  <div id="cutscene-cobra-wrap">
    <div id="cutscene-flash"></div>
    <img src="assets/king-cobra-idle.png" id="cutscene-cobra-img" alt="King Cobra">
  </div>
  <div id="cutscene-dialogue">
    <div id="cutscene-speaker">King Cobra</div>
    <div id="cutscene-text"></div>
    <div id="cutscene-tap">TAP TO CONTINUE ▶</div>
  </div>
</div>

<!-- ==================== COBRA BONUS SCREEN ==================== -->
<div id="cobra-screen" class="screen" hidden>
  <div id="cobra-arena-bg"></div>
  <div id="cobra-arena-overlay"></div>

  <div id="cobra-hud">
    <div class="cobra-badge">BONUS ROUND!</div>
    <div class="cobra-score-box">
      <span id="cobra-hero-score">0</span>
      <span class="cobra-score-sep">—</span>
      <span id="cobra-enemy-score" class="cobra-score-enemy">0</span>
    </div>
    <div class="cobra-round-label">Round <span id="cobra-round-num">—</span></div>
  </div>

  <div id="cobra-arena">
    <div class="fighter-zone" id="cobra-hero-zone">
      <div class="monster-wrap">
        <img src="" id="cobra-hero-img" class="monster-img" alt="Hero">
      </div>
      <div class="fighter-name" id="cobra-hero-name">KING KONG</div>
      <div class="win-dots" id="cobra-hero-wins"></div>
      <div class="number-card" id="cobra-hero-card" onclick="onCobraClick('hero')">
        <div class="card-num" id="cobra-hero-num">7</div>
        <div class="dot-array" id="cobra-hero-dots"></div>
      </div>
    </div>

    <div id="cobra-center-strip">
      <img src="assets/man-idle.png" id="cobra-man-img" alt="Referee">
      <div class="vs-text" id="cobra-vs-text">VS</div>
    </div>

    <div class="fighter-zone" id="cobra-fighter-zone">
      <div class="monster-wrap">
        <img src="assets/king-cobra-idle.png" id="cobra-img" class="monster-img" alt="King Cobra">
      </div>
      <div class="fighter-name" id="cobra-name">KING COBRA</div>
      <div class="win-dots" id="cobra-enemy-wins"></div>
      <div class="number-card" id="cobra-card" onclick="onCobraClick('cobra')">
        <div class="card-num" id="cobra-num">12</div>
        <div class="dot-array" id="cobra-dots"></div>
      </div>
    </div>
  </div>

  <div id="cobra-hint-bar" class="hidden">Tap the BIGGER number!</div>
</div>

<!-- ==================== RESULT SCREEN ==================== -->
<div id="result-screen" class="screen" hidden>
  <div class="result-content">
    <div class="result-title"  id="result-title">KING KONG WINS!</div>
    <img class="result-monster" id="result-img" src="assets/king-kong-victory.png" alt="">
    <div class="result-msg"    id="result-msg"></div>
    <div class="cobra-outcome" id="cobra-outcome" hidden></div>
    <div class="result-btns">
      <button class="btn btn-primary"   onclick="startBattle()">Play Again!</button>
      <button class="btn btn-secondary" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
// ============================= STATE =============================
const G = {
  arena:        'city',
  round:        0,
  totalRounds:  5,
  kkNum:        0,
  gzNum:        0,
  firstTry:     true,
  roundResults: [],     // 'first'|'hint' per round (for pips)
  roundWinners: [],     // 'kong'|'godzilla' per round
  wrongCount:   0,
  interacting:  true,
  // cobra bonus
  cobraHero:    null,
  cobraRound:   0,
  cobraWins:    0,
  cobraLosses:  0,
  cobraHeroWon: false,
  heroNum:      0,
  cobraNum:     0,
};

const GAME_CFG = { min: 10, max: 100, showDots: false };

let hintTimer = null;

// ============================= AUDIO =============================
function mkAudio(src) {
  const a = new Audio(src);
  a.preload = 'auto';
  return a;
}
const SFX = {
  correct: mkAudio('assets/sfc-correct.wav'),
  wrong:   mkAudio('assets/sfx-wrong.wav'),
  victory: mkAudio('assets/sfx-victory.wav'),
  roar:    mkAudio('assets/sfx-roar.mp3'),
};
function play(name) {
  const s = SFX[name];
  if (!s) return;
  s.currentTime = 0;
  s.play().catch(() => {});
}

// ============================= DOTS ==============================
function renderDots(n, showDots, container) {
  container.innerHTML = '';
  if (!showDots || n <= 0) return;

  if (n <= 10) {
    const rows = Math.ceil(n / 5);
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'dot-row';
      for (let d = 0; d < 5; d++) {
        const dot = document.createElement('div');
        dot.className = d < n - r * 5 ? 'dot' : 'dot spacer';
        row.appendChild(dot);
      }
      container.appendChild(row);
    }
  } else {
    const ones = n - 10;
    const tenLbl = document.createElement('div');
    tenLbl.className = 'ten-label';
    tenLbl.textContent = '10';
    container.appendChild(tenLbl);
    for (let r = 0; r < 2; r++) {
      const row = document.createElement('div');
      row.className = 'dot-row';
      for (let d = 0; d < 5; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot ten-dot';
        row.appendChild(dot);
      }
      container.appendChild(row);
    }
    if (ones > 0) {
      const onesLbl = document.createElement('div');
      onesLbl.className = 'ones-label';
      onesLbl.textContent = `+${ones}`;
      container.appendChild(onesLbl);
      const row = document.createElement('div');
      row.className = 'dot-row';
      for (let d = 0; d < ones; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        row.appendChild(dot);
      }
      container.appendChild(row);
    }
  }
}

// ============================= SCREENS ===========================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.hidden = true);
  document.getElementById(id).hidden = false;
}

function goHome() { showScreen('start-screen'); }

// ============================= ARENA SELECT ======================
function selectArena(name) {
  G.arena = name;
  document.querySelectorAll('.arena-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.arena === name);
  });
}

// ============================= BACKGROUND ========================
function setBg(name) {
  const MAP = {
    city:   "assets/bg-city-arena.png",
    ocean:  "assets/bg-ocean-arena.png",
    jungle: "assets/bg-jungle-arena.png",
  };
  document.getElementById('arena-bg').style.backgroundImage = `url('${MAP[name]}')`;
}

// ============================= MONSTER IMG =======================
function setMonster(who, state) {
  const key = who === 'kong' ? 'king-kong' : 'godzilla';
  const img = document.getElementById(`${who}-img`);
  img.src   = `assets/${key}-${state}.png`;
}

// ============================= WIN DOTS & PIPS ===================
function updateWinDots() {
  for (const who of ['kong', 'godzilla']) {
    const container = document.getElementById(`${who}-wins`);
    container.innerHTML = '';
    for (let i = 0; i < G.totalRounds; i++) {
      const dot = document.createElement('div');
      dot.className = 'win-dot';
      if (G.roundWinners[i] === who) dot.classList.add('won');
      container.appendChild(dot);
    }
  }
}

function updatePips() {
  const container = document.getElementById('pips');
  container.innerHTML = '';
  for (let i = 0; i < G.totalRounds; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (i < G.roundResults.length) {
      pip.classList.add(G.roundResults[i] === 'first' ? 'first-try' : 'with-hint');
    }
    container.appendChild(pip);
  }
}

// ============================= ROUND LOGIC =======================
function startBattle() {
  G.round        = 0;
  G.roundResults = [];
  G.roundWinners = [];
  G.interacting  = true;
  G.cobraHero    = null;
  G.cobraRound   = 0;
  G.cobraWins    = 0;
  G.cobraLosses  = 0;
  G.cobraHeroWon = false;
  G.heroNum      = 0;
  G.cobraNum     = 0;
  setBg(G.arena);
  updatePips();
  updateWinDots();
  showScreen('game-screen');
  showHintBar('Tap the BIGGER number!', false);
  setTimeout(nextRound, 600);
}

function nextRound() {
  G.round++;
  G.firstTry    = true;
  G.interacting = true;
  G.wrongCount  = 0;

  document.getElementById('round-num').textContent = G.round;

  const cfg = GAME_CFG;
  let n1, n2, attempts = 0;
  do {
    n1 = cfg.min + Math.floor(Math.random() * (cfg.max - cfg.min + 1));
    n2 = cfg.min + Math.floor(Math.random() * (cfg.max - cfg.min + 1));
    attempts++;
  } while ((n1 === n2 || Math.abs(n1 - n2) < 3) && attempts < 50);

  if (Math.random() < 0.5) { [n1, n2] = [n2, n1]; }
  G.kkNum = n1;
  G.gzNum = n2;

  document.getElementById('kong-num').textContent     = n1;
  document.getElementById('godzilla-num').textContent = n2;

  renderDots(n1, cfg.showDots, document.getElementById('kong-dots'));
  renderDots(n2, cfg.showDots, document.getElementById('godzilla-dots'));

  setMonster('kong',     'idle');
  setMonster('godzilla', 'idle');
  resetCard('kong');
  resetCard('godzilla');

  ['kong-card','godzilla-card'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('card-reveal','shake','wrong-flash','win-glow');
    void el.offsetWidth;
    el.classList.add('card-reveal');
  });

  updatePips();
  updateWinDots();
}

function resetCard(who) {
  const card = document.getElementById(`${who}-card`);
  card.style.borderColor = who === 'kong' ? '#FFD740' : '#44DD88';
  card.classList.remove('disabled','shake','wrong-flash','win-glow','card-reveal');
}

// ============================= CARD CLICK ========================
function onCardClick(who) {
  if (!G.interacting) return;
  G.interacting = false;

  const correct = G.kkNum > G.gzNum ? 'kong' : 'godzilla';
  if (who === correct) {
    handleCorrect(who);
  } else {
    handleWrong(who, correct);
  }
}

function handleCorrect(winner) {
  if (G.firstTry) G.roundResults.push('first');
  else            G.roundResults.push('hint');
  G.roundWinners.push(winner);

  play('correct');
  setTimeout(() => play('roar'), 180);

  document.getElementById(`${winner}-card`).classList.add('win-glow');

  const winImg = document.getElementById(`${winner}-img`);
  setMonster(winner, 'attack');
  winImg.classList.remove('monster-bounce','monster-bounce-mirror','green-flash','green-flash-mirror');
  void winImg.offsetWidth;
  if (winner === 'kong') {
    winImg.classList.add('monster-bounce', 'green-flash');
  } else {
    winImg.classList.add('monster-bounce-mirror', 'green-flash-mirror');
  }

  const loser = winner === 'kong' ? 'godzilla' : 'kong';
  setTimeout(() => setMonster(loser, 'sad'), 250);

  // Write out "X is greater than Y"
  const bigger  = Math.max(G.kkNum, G.gzNum);
  const smaller = Math.min(G.kkNum, G.gzNum);
  const winName = winner === 'kong' ? 'King Kong' : 'Godzilla';
  const direction = winner === 'kong' ? '>' : '<';
  const vsEl = document.querySelector('.vs-text');
  vsEl.textContent = `${G.kkNum} ${direction} ${G.gzNum}`;
  vsEl.classList.add('compare');
  const manImg = document.getElementById('man-img');
  manImg.src = winner === 'godzilla' ? 'assets/man-right.png' : 'assets/man-left.png';
  setTimeout(() => {
    vsEl.textContent = 'VS';
    vsEl.classList.remove('compare');
    manImg.src = 'assets/man-idle.png';
  }, 1800);

  showHintBar(`${bigger} is greater than ${smaller}! ${winName} wins!`, false);

  updatePips();
  updateWinDots();

  setTimeout(() => {
    hideHintBar();
    if (G.round >= G.totalRounds) {
      showCobraCutscene();
    } else {
      nextRound();
    }
  }, 1900);
}

function handleWrong(chosen, correct) {
  G.firstTry = false;
  G.wrongCount++;

  play('wrong');

  const wrongCard = document.getElementById(`${chosen}-card`);
  wrongCard.classList.remove('shake','wrong-flash');
  void wrongCard.offsetWidth;
  wrongCard.classList.add('shake','wrong-flash');

  setMonster(correct, 'attack');

  const cfg = GAME_CFG;
  const largeNumbers = G.kkNum > 20 || G.gzNum > 20;
  if (G.wrongCount === 1 && !largeNumbers) {
    if (!cfg.showDots) {
      renderDots(G.kkNum, true, document.getElementById('kong-dots'));
      renderDots(G.gzNum, true, document.getElementById('godzilla-dots'));
    }
    showHintBar(`Hmm, let's count together! Which has more? Try again!`, true);
  } else {
    const bigger = Math.max(G.kkNum, G.gzNum);
    showHintBar(`The bigger number is ${bigger}! Tap it!`, true);
  }

  setTimeout(() => {
    setMonster(correct, 'idle');
    G.interacting = true;
  }, 1100);
}

// ============================= HELP BUTTON =======================
function onHelpBtn() {
  G.firstTry = false;
  const cfg = GAME_CFG;
  const largeNumbers = G.kkNum > 20 || G.gzNum > 20;
  const bigger = Math.max(G.kkNum, G.gzNum);
  if (!cfg.showDots && !largeNumbers) {
    renderDots(G.kkNum, true, document.getElementById('kong-dots'));
    renderDots(G.gzNum, true, document.getElementById('godzilla-dots'));
    showHintBar(`Count the dots! The bigger number is ${bigger}. Tap it!`, true);
  } else {
    showHintBar(`The bigger number is ${bigger}. Tap it!`, true);
  }
}

// ============================= HINT BAR ==========================
function showHintBar(text, persistent) {
  const bar = document.getElementById('hint-bar');
  bar.textContent = text;
  bar.classList.remove('hidden');
  clearTimeout(hintTimer);
  if (!persistent) {
    hintTimer = setTimeout(() => bar.classList.add('hidden'), 1700);
  }
}
function hideHintBar() {
  clearTimeout(hintTimer);
  document.getElementById('hint-bar').classList.add('hidden');
}

// ============================= COBRA CUTSCENE ====================
const COBRA_LINES = [
  "Now you must fight the King Cobra!",
];

function showCobraCutscene() {
  showScreen('cobra-cutscene');

  const cobraImg  = document.getElementById('cutscene-cobra-img');
  const flash     = document.getElementById('cutscene-flash');
  const screen    = document.getElementById('cobra-cutscene');
  const speakerEl = document.getElementById('cutscene-speaker');
  const textEl    = document.getElementById('cutscene-text');
  const tapEl     = document.getElementById('cutscene-tap');

  cobraImg.classList.remove('risen');
  screen.classList.remove('vignette');
  speakerEl.classList.remove('visible');
  tapEl.classList.remove('visible');
  textEl.textContent = '';

  setTimeout(() => {
    flash.classList.add('flashing');
    setTimeout(() => flash.classList.remove('flashing'), 180);
    setTimeout(() => {
      flash.classList.add('flashing');
      setTimeout(() => flash.classList.remove('flashing'), 180);
    }, 220);
  }, 300);

  setTimeout(() => {
    cobraImg.classList.add('risen');
    screen.classList.add('vignette');
  }, 600);

  setTimeout(() => {
    speakerEl.classList.add('visible');
    textEl.textContent = COBRA_LINES[0];
    tapEl.classList.add('visible');
  }, 1100);
}

function cutsceneAdvance() {
  startCobraBonus();
}

// ============================= COBRA BONUS ROUND =================
let cobraHintTimer = null;

function showCobraHintBar(text, persistent) {
  const bar = document.getElementById('cobra-hint-bar');
  bar.textContent = text;
  bar.classList.remove('hidden');
  clearTimeout(cobraHintTimer);
  if (!persistent) {
    cobraHintTimer = setTimeout(() => bar.classList.add('hidden'), 1800);
  }
}
function hideCobraHintBar() {
  clearTimeout(cobraHintTimer);
  document.getElementById('cobra-hint-bar').classList.add('hidden');
}

function setCobraMonster(who, state) {
  if (who === 'cobra') {
    document.getElementById('cobra-img').src = `assets/king-cobra-${state}.png`;
  } else {
    const key = G.cobraHero === 'kong' ? 'king-kong' : 'godzilla';
    document.getElementById('cobra-hero-img').src = `assets/${key}-${state}.png`;
  }
}

function updateCobraWinDots() {
  const heroFill = G.cobraHero === 'kong' ? '#FFD740' : '#44DD88';
  const heroGlow = G.cobraHero === 'kong' ? 'rgba(255,215,0,0.6)' : 'rgba(68,221,136,0.6)';

  const heroContainer = document.getElementById('cobra-hero-wins');
  heroContainer.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'win-dot';
    if (i < G.cobraWins) {
      dot.style.background  = heroFill;
      dot.style.borderColor = heroFill;
      dot.style.boxShadow   = `0 0 8px ${heroGlow}`;
    }
    heroContainer.appendChild(dot);
  }

  const enemyContainer = document.getElementById('cobra-enemy-wins');
  enemyContainer.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'win-dot';
    if (i < G.cobraLosses) dot.classList.add('won');
    enemyContainer.appendChild(dot);
  }

  document.getElementById('cobra-hero-score').textContent  = G.cobraWins;
  document.getElementById('cobra-enemy-score').textContent = G.cobraLosses;
}

function startCobraBonus() {
  const kongWins  = G.roundWinners.filter(w => w === 'kong').length;
  const gzWins    = G.roundWinners.filter(w => w === 'godzilla').length;
  G.cobraHero     = kongWins >= gzWins ? 'kong' : 'godzilla';
  G.cobraRound    = 0;
  G.cobraWins     = 0;
  G.cobraLosses   = 0;

  const heroName  = G.cobraHero === 'kong' ? 'KING KONG' : 'GODZILLA';
  const heroColor = G.cobraHero === 'kong' ? 'var(--kong)' : 'var(--godzilla)';
  const heroScoreColor = G.cobraHero === 'kong' ? '#FFDD44' : '#66FF99';

  document.getElementById('cobra-hero-name').textContent  = heroName;
  document.getElementById('cobra-hero-name').style.color  = heroColor;
  document.getElementById('cobra-hero-score').style.color = heroScoreColor;

  const MAP = { city: 'assets/bg-city-arena.png', ocean: 'assets/bg-ocean-arena.png', jungle: 'assets/bg-jungle-arena.png' };
  document.getElementById('cobra-arena-bg').style.backgroundImage = `url('${MAP[G.arena]}')`;

  setCobraMonster('hero',  'idle');
  setCobraMonster('cobra', 'idle');
  updateCobraWinDots();
  showScreen('cobra-screen');
  showCobraHintBar(`${heroName} faces the King Cobra! Tap the BIGGER number!`, false);
  setTimeout(nextCobraRound, 900);
}

function nextCobraRound() {
  G.cobraRound++;
  G.interacting = true;
  document.getElementById('cobra-round-num').textContent = G.cobraRound;

  const cfg = GAME_CFG;
  let n1, n2, attempts = 0;
  do {
    n1 = cfg.min + Math.floor(Math.random() * (cfg.max - cfg.min + 1));
    n2 = cfg.min + Math.floor(Math.random() * (cfg.max - cfg.min + 1));
    attempts++;
  } while ((n1 === n2 || Math.abs(n1 - n2) < 2) && attempts < 50);

  if (Math.random() < 0.5) { [n1, n2] = [n2, n1]; }
  G.heroNum  = n1;
  G.cobraNum = n2;

  document.getElementById('cobra-hero-num').textContent = n1;
  document.getElementById('cobra-num').textContent      = n2;

  renderDots(n1, cfg.showDots, document.getElementById('cobra-hero-dots'));
  renderDots(n2, cfg.showDots, document.getElementById('cobra-dots'));

  setCobraMonster('hero',  'idle');
  setCobraMonster('cobra', 'idle');

  const heroColor = G.cobraHero === 'kong' ? '#FFD740' : '#44DD88';
  const heroCard  = document.getElementById('cobra-hero-card');
  const cobraCard = document.getElementById('cobra-card');
  heroCard.style.borderColor  = heroColor;
  cobraCard.style.borderColor = '#FF6600';
  ['cobra-hero-card', 'cobra-card'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('disabled', 'shake', 'wrong-flash', 'win-glow', 'card-reveal');
    void el.offsetWidth;
    el.classList.add('card-reveal');
  });

  updateCobraWinDots();
  showCobraHintBar('Tap the BIGGER number!', false);
}

function onCobraClick(who) {
  if (!G.interacting) return;
  G.interacting = false;
  const correct = G.heroNum > G.cobraNum ? 'hero' : 'cobra';
  if (who === correct) {
    handleCobraCorrect(correct);
  } else {
    handleCobraWrong(who, correct);
  }
}

function handleCobraCorrect(winner) {
  play('correct');
  setTimeout(() => play('roar'), 180);

  const vsEl = document.getElementById('cobra-vs-text');
  const dir  = G.heroNum > G.cobraNum ? '>' : '<';
  vsEl.textContent = `${G.heroNum} ${dir} ${G.cobraNum}`;
  vsEl.classList.add('compare');
  const cobraManImg = document.getElementById('cobra-man-img');
  cobraManImg.src = winner === 'cobra' ? 'assets/man-right.png' : 'assets/man-left.png';
  setTimeout(() => {
    vsEl.textContent = 'VS';
    vsEl.classList.remove('compare');
    cobraManImg.src = 'assets/man-idle.png';
  }, 1600);

  const bigger  = Math.max(G.heroNum, G.cobraNum);
  const smaller = Math.min(G.heroNum, G.cobraNum);

  if (winner === 'hero') {
    G.cobraWins++;
    document.getElementById('cobra-hero-card').classList.add('win-glow');
    setCobraMonster('hero', 'attack');
    setTimeout(() => setCobraMonster('cobra', 'sad'), 250);
    const heroImg = document.getElementById('cobra-hero-img');
    heroImg.classList.remove('monster-bounce', 'monster-bounce-mirror', 'green-flash', 'green-flash-mirror');
    void heroImg.offsetWidth;
    heroImg.classList.add('monster-bounce', 'green-flash');
    showCobraHintBar(`${bigger} is greater than ${smaller}! Hero strikes!`, false);
  } else {
    G.cobraLosses++;
    document.getElementById('cobra-card').classList.add('win-glow');
    setCobraMonster('cobra', 'attack');
    setTimeout(() => setCobraMonster('hero', 'sad'), 250);
    const cobraImg = document.getElementById('cobra-img');
    cobraImg.classList.remove('monster-bounce', 'monster-bounce-mirror', 'cobra-flash');
    void cobraImg.offsetWidth;
    cobraImg.classList.add('monster-bounce-mirror', 'cobra-flash');
    showCobraHintBar(`${bigger} is greater than ${smaller}! Cobra strikes!`, false);
  }

  updateCobraWinDots();

  setTimeout(() => {
    hideCobraHintBar();
    if (G.cobraWins >= 2 || G.cobraLosses >= 2) {
      G.cobraHeroWon = G.cobraWins >= 2;
      endBattle();
    } else {
      nextCobraRound();
    }
  }, 1900);
}

function handleCobraWrong(chosen, correct) {
  play('wrong');

  const wrongId   = chosen === 'hero' ? 'cobra-hero-card' : 'cobra-card';
  const wrongCard = document.getElementById(wrongId);
  wrongCard.classList.remove('shake', 'wrong-flash');
  void wrongCard.offsetWidth;
  wrongCard.classList.add('shake', 'wrong-flash');

  setCobraMonster(correct, 'attack');

  const bigger = Math.max(G.heroNum, G.cobraNum);
  showCobraHintBar(`The bigger number is ${bigger}! Tap it!`, true);

  setTimeout(() => {
    setCobraMonster(correct, 'idle');
    G.interacting = true;
  }, 1100);
}

// ============================= END BATTLE ========================
function endBattle() {
  setTimeout(() => play('victory'), 300);

  const kongWins    = G.roundWinners.filter(w => w === 'kong').length;
  const gzWins      = G.roundWinners.filter(w => w === 'godzilla').length;
  const battleWinner = kongWins >= gzWins ? 'kong' : 'godzilla';

  let imgSrc;
  if (!G.cobraHeroWon) {
    imgSrc = 'assets/king-cobra-victory.png';
  } else {
    imgSrc = battleWinner === 'kong' ? 'assets/king-kong-victory.png' : 'assets/godzilla-victory.png';
  }

  const titles = [
    "You're Amazing!",
    "Number Champion!",
    "Brilliant Work!",
    "Incredible!",
  ];
  const title = titles[Math.floor(Math.random() * titles.length)];

  const encouragements = [
    "You worked SO hard today!",
    "Your brain is getting stronger!",
    "Keep practicing — you're amazing!",
    "Every round made you smarter!",
  ];
  const msg = encouragements[Math.floor(Math.random() * encouragements.length)];

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-img').src           = imgSrc;
  document.getElementById('result-msg').textContent   = msg;

  const cobraEl   = document.getElementById('cobra-outcome');
  const heroName  = G.cobraHero === 'kong' ? 'King Kong' : 'Godzilla';
  if (G.cobraHeroWon) {
    cobraEl.textContent = `BONUS: ${heroName} defeated the King Cobra! ${G.cobraWins}–${G.cobraLosses}`;
    cobraEl.className = 'cobra-outcome hero-won';
  } else {
    cobraEl.textContent = `BONUS: King Cobra won! ${G.cobraLosses}–${G.cobraWins} — Try again next time!`;
    cobraEl.className = 'cobra-outcome cobra-won';
  }
  cobraEl.hidden = false;

  showScreen('result-screen');
  showConfetti();
}

// ============================= CONFETTI ==========================
function showConfetti() {
  const container = document.getElementById('result-screen');
  const colors = ['#FFD700','#FF6633','#66FF99','#FFDD44','#FF4488','#44AAFF','#FF9900'];
  for (let i = 0; i < 48; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[i % colors.length]};
      animation-delay: ${(Math.random() * 1.4).toFixed(2)}s;
      animation-duration: ${(1.4 + Math.random() * 0.8).toFixed(2)}s;
      width: ${6 + Math.floor(Math.random() * 8)}px;
      height: ${6 + Math.floor(Math.random() * 8)}px;
      border-radius: ${Math.random() < 0.4 ? '50%' : '3px'};
    `;
    container.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ============================= INIT ==============================
selectArena('city');
showScreen('start-screen');
</script>
